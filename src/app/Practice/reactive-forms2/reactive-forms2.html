<div class="flex justify-center">
  <div class="rounded-lg bg-white shadow-lg shadow-taupe-600 w-10/12 my-4">
    <div class="bg-gray-400 rounded-t-lg">
      <h1 class="font-bold text-sm px-2 py-1">Registration form</h1>
    </div>
    <div class="mx-10 p-4 space-y-4">
      <div class="grid grid-cols-2 space-y-2">
        <div class="flex flex-col gap-1">
          <label for="firstName">First Name</label>
          <input
            type="text"
            id="firstName"
            class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="lastName">Last Name</label>
          <input
            type="text"
            id="lastName"
            class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="gender">Gender</label>
          <div class="flex w-11/12">
            <input
              type="radio"
              id="gender"
              value="male"
              class="shadow-sm rounded-md border px-2 py-1 text-sm"
            />
            <input
              type="radio"
              id="gender"
              value="Female"
              class="shadow-sm rounded-md border px-2 py-1 text-sm"
            />
          </div>
        </div>
        <div class="flex flex-col gap-1">
          <label for="dob">DOB</label>
          <input
            type="date"
            id="dob"
            class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="phNo">Phone No</label>
          <input
            type="tel"
            id="phNo"
            class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="location">Preffered Location</label>
          <input
            type="text"
            id="location"
            class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="profilePic">Profile Pic</label>
          <input
            type="image"
            id="firstName"
            class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
          />
        </div>
      </div>
      <div>
        <div>
          <h1>Bio</h1>
          <textarea
            name="bio"
            class="w-full h-20 border rounded-md border-gray-400 px-2 py-1 text-sm"
          ></textarea>
        </div>
      </div>
      <div class="flex gap-2 justify-between">
        <div class="w-6/12">
          <div>
            <h1 class="font-bold text-sm px-2 py-1">Present Address</h1>
          </div>
          <div class="border rounded-md">
            <div class="p-4">
              <div class="flex flex-col gap-1">
                <label for="add1">Address 1</label>
                <input
                  type="text"
                  id="add1"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
              <div class="flex flex-col gap-1">
                <label for="add2">Address 2</label>
                <input
                  type="text"
                  id="add2"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
              <div class="flex flex-col gap-1">
                <label for="city">City</label>
                <input
                  type="email"
                  id="city"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
              <div class="flex flex-col gap-1">
                <label for="state">State</label>
                <input
                  type="tel"
                  id="state"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
              <div class="flex flex-col gap-1">
                <label for="pin">PinCode</label>
                <input
                  type="text"
                  id="pin"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="w-6/12">
          <div>
            <h1 class="font-bold text-sm px-2 py-1">Preffered Address</h1>
          </div>
          <div class="border rounded-md">
            <div class="p-4">
              <div class="flex flex-col gap-1">
                <label for="add1">Address 1</label>
                <input
                  type="text"
                  id="add1"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
              <div class="flex flex-col gap-1">
                <label for="add2">Address 2</label>
                <input
                  type="text"
                  id="add2"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
              <div class="flex flex-col gap-1">
                <label for="city">City</label>
                <input
                  type="email"
                  id="city"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
              <div class="flex flex-col gap-1">
                <label for="state">State</label>
                <input
                  type="tel"
                  id="state"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
              <div class="flex flex-col gap-1">
                <label for="pin">PinCode</label>
                <input
                  type="text"
                  id="pin"
                  class="shadow-sm rounded-sm border border-gray-400 w-11/12 px-2 py-1 text-sm"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div>
          <h1 class="font-bold text-sm">Educations</h1>
        </div>
        <div class="flex gap-4">
          <div>
            <h1 class="text-sm font-bold">Sno</h1>
            <h1>{{ count }}</h1>
          </div>
          <div>
            <label for="school" class="block text-sm font-bold">School</label>
            <input type="text" class="border border-gray-400 rounded-sm px-2 py-1 w-40 text-sm" />
          </div>
          <div>
            <label for="degree" class="block text-sm font-bold">Degree</label>
            <input type="text" class="border border-gray-400 rounded-sm px-2 py-1 w-40 text-sm" />
          </div>
          <div>
            <label for="year" class="block text-sm font-bold">Passout?</label>
            <div class="text-center"><input type="checkbox" id="year" /></div>
          </div>
          <div>
            <label for="year" class="block text-sm font-bold">Year</label>
            <input type="text" class="border border-gray-400 rounded-sm px-2 py-1 w-40 text-sm" />
          </div>
          <div>
            <label for="mark" class="block text-sm font-bold">Mark%</label>
            <input type="text" class="border border-gray-400 rounded-sm px-2 py-1 w-40 text-sm" />
          </div>
          <div>
            <div class="flex gap-1 justify-center items-center">
              <div
                class="flex justify-center items-center bg-blue-600 h-5 w-5 mt-6 rounded-sm cursor-pointer"
              >
                <button class="text-white cursor-pointer">+</button>
              </div>
              <div
                class="flex justify-center items-center bg-red-700 h-5 w-5 mt-6 rounded-sm text-sm cursor-pointer"
              >
                <button class="text-white cursor-pointer">x</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="bg-gray-400 rounded-b-lg px-16 py-2">
      <button
        type="submit"
        class="border rounded-md text-sm px-2 py-1 cursor-pointer hover:bg-black hover:text-white"
      >
        Submit
      </button>
    </div>
  </div>
</div>
